<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
  <h1>Login</h1>
  <form onsubmit="event.preventDefault(); login(email.value, password.value);">
    <input type="email" id="email" name="email" placeholder="Email" required><br>
    <input type="password" id="password" name="password" placeholder="Password" required><br>
    <button type="submit">Login with Email</button>
  </form>
  <hr>
  <h2>Or Login with Phone OTP</h2>
  <input type="text" id="phone" placeholder="Phone Number"><br>
  <button onclick="sendOTP(phone.value)">Send OTP</button>
  <input type="text" id="otp" placeholder="Enter OTP"><br>
  <button onclick="verifyOTP(otp.value)">Verify OTP</button>
  <div id="recaptcha-container"></div>
  <script type="module" src="/assets/js/logger.js"></script>
  <script type="module" src="/assets/js/auth.js"></script>
  <script type="module" src="/assets/js/otp.js"></script>
</body>
</html>
